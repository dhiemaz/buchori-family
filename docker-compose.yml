services:
  buchori-family:
    build: .
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  api:
    build: ./server
    restart: unless-stopped
    environment:
      - DB_PATH=/data/family.db
      - PORT=3001
    volumes:
      - sqlite-data:/data

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-global.conf:/etc/nginx/nginx.conf:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - buchori-family
      - api
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

volumes:
  sqlite-data:
